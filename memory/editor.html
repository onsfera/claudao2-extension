<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memória do Claude</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #141312; color: #f0eee6;
        font-family: system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; }
      header { padding: 18px 24px; border-bottom: 1px solid #2f2d2b; display: flex; align-items: baseline; gap: 12px; }
      header h1 { font-size: 18px; margin: 0; display: inline-flex; align-items: center; gap: 8px; }
      .lucide { flex: none; vertical-align: middle; }
      button { display: inline-flex; align-items: center; gap: 6px; }
      header .sub { color: #a3a096; font-size: 12px; }
      .layout { display: flex; height: calc(100vh - 61px); }
      aside { width: 260px; border-right: 1px solid #2f2d2b; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
      .doc { display: flex; justify-content: space-between; align-items: center; gap: 6px; padding: 9px 10px;
        border-radius: 8px; cursor: pointer; border: 1px solid transparent; font-family: ui-monospace, monospace; font-size: 13px; }
      .doc:hover { background: #1f1e1d; }
      .doc.active { background: #26241f; border-color: #4a4844; }
      .doc .pin { opacity: .5; }
      .doc.pinned .pin { opacity: 1; }
      main { flex: 1; display: flex; flex-direction: column; padding: 16px 24px; overflow: hidden; }
      .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
      .toolbar .name { font-family: ui-monospace, monospace; font-size: 14px; color: #f0eee6; }
      textarea { flex: 1; width: 100%; resize: none; background: #1f1e1d; color: #f0eee6; border: 1px solid #3a3836;
        border-radius: 10px; padding: 14px; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.6; }
      button { background: #34322e; color: #f0eee6; border: 1px solid #4a4844; border-radius: 8px;
        padding: 8px 12px; cursor: pointer; font-size: 13px; font-family: inherit; }
      button:hover { background: #403d38; }
      button.primary { background: #7867fd; border-color: #7867fd; color: #fff; }
      button.primary:hover { filter: brightness(1.08); }
      button.danger { border-color: #5a3a3a; color: #ff9b9b; }
      button.mini { padding: 5px 9px; font-size: 12px; }
      label.pinbox { display: flex; gap: 6px; align-items: center; color: #cfccc3; font-size: 12px; cursor: pointer; }
      .status { color: #8fce8f; font-size: 12px; margin-left: auto; min-height: 16px; }
      .foot { padding: 10px 24px; border-top: 1px solid #2f2d2b; display: flex; gap: 8px; align-items: center; font-size: 12px; color: #a3a096; }
      input[type=file] { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1 data-icon="brain">Claudão² — Memória</h1>
      <span class="sub">chrome.storage.local · fica só no seu navegador · persiste entre reaberturas</span>
    </header>
    <div class="layout">
      <aside id="list"></aside>
      <main>
        <div class="toolbar">
          <span class="name" id="doc-name">—</span>
          <label class="pinbox"><input type="checkbox" id="pin" /> Fixado (injetado nas conversas)</label>
          <button class="mini" id="rename" data-icon="pencil">Renomear</button>
          <button class="mini danger" id="delete" data-icon="trash-2">Apagar</button>
          <span class="status" id="status"></span>
        </div>
        <textarea id="content" spellcheck="false"></textarea>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="primary" id="save" data-icon="save">Salvar</button>
          <button id="new" data-icon="plus">Novo documento</button>
        </div>
      </main>
    </div>
    <div class="foot">
      <button id="export" data-icon="download">Exportar backup (.json)</button>
      <button id="import" data-icon="upload">Importar backup</button>
      <button class="danger" id="reset" data-icon="rotate-ccw">Restaurar sementes</button>
      <input id="file" type="file" accept="application/json" />
      <span id="updated" style="margin-left:auto"></span>
    </div>

    <script src="core.js"></script>
    <script src="icons.js"></script>
    <script src="editor.js"></script>
  </body>
</html>
